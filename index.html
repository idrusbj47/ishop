<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iShop Member — Cek Status Pembayaran</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --card: #111827;
    --card2: #1a2235;
    --border: #1e2d45;
    --green: #22c55e;
    --green-dim: #16a34a22;
    --yellow: #f59e0b;
    --yellow-dim: #f59e0b22;
    --red: #ef4444;
    --red-dim: #ef444422;
    --blue: #3b82f6;
    --blue-dim: #3b82f622;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #38bdf8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 0%, #0d2137 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, #0a1f10 0%, transparent 60%);
  }

  /* HEADER */
  header {
    padding: 40px 20px 30px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 20px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .logo-badge span { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  header h1 {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 800;
    background: linear-gradient(135deg, #e2e8f0 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  header p {
    color: var(--muted);
    font-size: 15px;
  }

  /* SEARCH AREA */
  .search-wrap {
    max-width: 640px;
    margin: 40px auto 0;
    padding: 0 20px;
  }
  .search-box {
    position: relative;
    display: flex;
    gap: 10px;
  }
  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }
  #searchInput {
    flex: 1;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px 16px 50px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border .2s, box-shadow .2s;
    letter-spacing: 0.05em;
  }
  #searchInput::placeholder { color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0; }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px #38bdf820;
  }
  .btn-cek {
    background: linear-gradient(135deg, #0ea5e9, #38bdf8);
    color: #0a0f1a;
    border: none;
    border-radius: 14px;
    padding: 16px 28px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    white-space: nowrap;
  }
  .btn-cek:hover { transform: translateY(-1px); box-shadow: 0 8px 24px #38bdf840; }
  .btn-cek:active { transform: translateY(0); }

  /* SUGGESTIONS */
  .suggestions {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 8px;
    overflow: hidden;
    display: none;
  }
  .suggestions.show { display: block; }
  .suggestion-item {
    padding: 12px 18px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--card2); }
  .suggestion-item .s-code { color: var(--accent); }
  .suggestion-item .s-name { color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; }

  /* RESULT */
  .result-area {
    max-width: 700px;
    margin: 30px auto 60px;
    padding: 0 20px;
  }
  .not-found {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 40px;
    text-align: center;
    display: none;
  }
  .not-found .nf-icon { font-size: 48px; margin-bottom: 12px; }
  .not-found h3 { color: var(--red); margin-bottom: 6px; }
  .not-found p { color: var(--muted); font-size: 14px; }

  .result-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    display: none;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .rc-header {
    background: var(--card2);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .rc-mid {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mid-badge {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .rc-name { font-size: 18px; font-weight: 700; }
  .status-pill {
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .status-lunas { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .status-proses { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow); }
  .status-aktif { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }

  .rc-body {
    padding: 24px;
  }
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .info-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .info-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .info-value { font-size: 14px; font-weight: 600; color: var(--text); }
  .info-value.money { color: var(--accent); font-family: 'JetBrains Mono', monospace; }

  .payments-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .payment-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .payment-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    background: var(--card2);
    border: 1px solid var(--border);
  }
  .pr-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 20px;
  }
  .pr-date { font-size: 13px; font-weight: 500; flex: 1; }
  .pr-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }
  .pr-status {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 50px;
    white-space: nowrap;
  }
  .pr-lunas { background: var(--green-dim); color: var(--green); }
  .pr-proses { background: var(--yellow-dim); color: var(--yellow); }
  .pr-dp { background: var(--blue-dim); color: var(--blue); }

  .raw-text {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: var(--muted);
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 20px;
  }
  .raw-toggle {
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    margin-bottom: 16px;
    display: block;
  }

  /* WA BUTTON */
  .wa-section {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-wa {
    flex: 1;
    min-width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px 24px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 10px 30px #25D36640; }
  .btn-copy {
    background: var(--card2);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 14px;
    padding: 16px 20px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, border .15s;
    white-space: nowrap;
  }
  .btn-copy:hover { background: var(--border); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }

  /* ALL MEMBERS TABLE */
  .members-section {
    max-width: 700px;
    margin: 0 auto 60px;
    padding: 0 20px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }
  .member-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border .15s, background .15s;
  }
  .member-chip:hover { border-color: var(--accent); background: var(--card2); }
  .chip-code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 2px; }
  .chip-name { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip-status { display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 50px; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
  }

  .wa-icon {
    width: 22px;
    height: 22px;
  }
</style>
</head>

// Parse member name from raw text
function parseName(raw) {
  const m = raw.match(/Nama\s*:\s*(.+)/);
  return m ? m[1].trim() : '-';
}
function parseMid(raw) {
  const m = raw.match(/MID\s*:\s*(\S+)/);
  return m ? m[1].trim() : '-';
}
function parseItem(raw) {
  const m = raw.match(/IDB\s*:\s*(.+)/);
  return m ? m[1].trim() : '-';
}
function parseNet(raw) {
  const m = raw.match(/Net\s*:\s*(.+)/);
  return m ? m[1].trim() : '-';
}
function parseTgl(raw) {
  const m = raw.match(/Tgl\s*:\s*(.+)/);
  return m ? m[1].trim() : '-';
}
function parseTag(raw) {
  const m = raw.match(/Tag\s*:\s*(.+)/);
  return m ? m[1].trim() : '-';
}
function parseSisa(raw) {
  // Look for T.Tag with remaining amount
  const m = raw.match(/_T\.Tag[\w\d\s]*:\s*([^_]+)_/);
  return m ? m[1].trim() : null;
}
function getOverallStatus(raw) {
  const upper = raw.toUpperCase();
  if (upper.includes('*LUNAS*') || upper.includes('LUNAS*') || raw.includes('*LUNAS') || raw.includes('Rp. 0_ *Lunas') || raw.includes('Rp.0_ *Lunas') || raw.includes('Rp. 0_ *LUNAS') || raw.includes('*Lunas*') || raw.includes('Rp. 0_ *Lunas*')) return 'lunas';
  if (raw.match(/T\.Tag[\w\d\s]*:\s*Rp\.\s*0/)) return 'lunas';
  return 'aktif';
}

function parsePayments(raw) {
  const lines = raw.split('\n');
  const payments = [];
  for (const line of lines) {
    // Match payment lines: number. date = amount (status)
    // Pattern: optional ~, amount~, optional (status)
    const m = line.match(/^\s*(\d+[\.\d]*)\s*[.\)]\s*(.+)/);
    if (!m) continue;
    const rest = m[2];
    // Check if it's a payment line (contains = Rp or just Rp)
    if (!rest.includes('Rp') && !rest.includes('rp')) continue;
    
    const isLunas = rest.includes('~') || rest.toLowerCase().includes('lunas');
    const isProses = rest.toLowerCase().includes('proses');
    const isDp = rest.toLowerCase().includes('dp');
    
    // Extract date part (before = or start)
    let datePart = rest.replace(/~|\*/g, '').split('=')[0].trim();
    // Remove leading date chars
    datePart = datePart.replace(/^[→>▸\-\s]+/, '').trim();
    
    // Extract amount
    const amtMatch = rest.match(/Rp\.?\s*([\d.,]+(?:\s*[KkM])?)/);
    const amount = amtMatch ? 'Rp. ' + amtMatch[1] : '';
    
    let status = 'proses';
    if (isLunas) status = 'lunas';
    else if (isDp) status = 'dp';
    
    payments.push({
      num: m[1],
      date: datePart,
      amount,
      status,
      raw: rest.trim()
    });
  }
  return payments;
}

function cekStatus(code) {
  const input = code || document.getElementById('searchInput').value.trim().toUpperCase();
  document.getElementById('suggestions').classList.remove('show');
  
  // Try exact match first, then case-insensitive
  let key = null;
  if (DATA[input]) {
    key = input;
  } else {
    key = Object.keys(DATA).find(k => k.toUpperCase() === input);
  }
  
  const nf = document.getElementById('notFound');
  const rc = document.getElementById('resultCard');

  if (!key) {
    nf.style.display = 'block';
    rc.style.display = 'none';
    return;
  }
  
  nf.style.display = 'none';
  rc.style.display = 'block';
  
  const raw = DATA[key];
  const name = parseName(raw);
  const mid = parseMid(raw);
  const item = parseItem(raw);
  const net = parseNet(raw);
  const tgl = parseTgl(raw);
  const tag = parseTag(raw);
  const sisa = parseSisa(raw);
  const overallStatus = getOverallStatus(raw);
  const payments = parsePayments(raw);
  
  document.getElementById('rcMid').textContent = mid;
  document.getElementById('rcName').textContent = name;
  
  const pill = document.getElementById('rcStatusPill');
  if (overallStatus === 'lunas') {
    pill.textContent = '✓ LUNAS';
    pill.className = 'status-pill status-lunas';
  } else {
    pill.textContent = '⚡ AKTIF';
    pill.className = 'status-pill status-aktif';
  }
  
  // Info grid
  const infoItems = [
    {label:'Barang / Item', value: item},
    {label:'Harga Net', value: net, cls:'money'},
    {label:'Tanggal Mulai', value: tgl},
    {label:'Angsuran', value: tag},
  ];
  if (sisa) infoItems.push({label:'Sisa Tagihan', value: sisa, cls:'money'});
  
  document.getElementById('infoGrid').innerHTML = infoItems.map(i =>
    `<div class="info-item"><div class="info-label">${i.label}</div><div class="info-value ${i.cls||''}">${i.value}</div></div>`
  ).join('');
  
  // Payment list
  const payList = document.getElementById('paymentList');
  if (payments.length > 0) {
    payList.innerHTML = payments.map(p => `
      <div class="payment-row">
        <span class="pr-num">${p.num}.</span>
        <span class="pr-date">${p.date}</span>
        <span class="pr-amount">${p.amount}</span>
        <span class="pr-status pr-${p.status}">${p.status === 'lunas' ? '✓ Lunas' : p.status === 'dp' ? 'DP' : '⏳ Proses'}</span>
      </div>
    `).join('');
  } else {
    payList.innerHTML = '<div class="payment-row"><span style="color:var(--muted);font-size:13px">Tidak ada data pembayaran terstruktur</span></div>';
  }
  
  // Raw text
  document.getElementById('rawText').textContent = raw;
  
  // WA button
  const waText = encodeURIComponent(raw);
  document.getElementById('waBtn').href = `https://wa.me/?text=${waText}`;
  
  // Store raw for copy
  document.getElementById('copyBtn').dataset.raw = raw;
  document.getElementById('copyBtn').textContent = '📋 Salin Teks';
  document.getElementById('copyBtn').classList.remove('copied');
  
  // Scroll to result
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function toggleRaw() {
  const el = document.getElementById('rawText');
  const btn = document.querySelector('.raw-toggle');
  if (el.style.display === 'none') {
    el.style.display = 'block';
    btn.textContent = '▾ Sembunyikan teks asli';
  } else {
    el.style.display = 'none';
    btn.textContent = '▸ Lihat teks asli WhatsApp';
  }
}

function copyText() {
  const raw = document.getElementById('copyBtn').dataset.raw;
  navigator.clipboard.writeText(raw).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Tersalin!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Salin Teks';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Autocomplete
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toUpperCase();
  const sug = document.getElementById('suggestions');
  if (!q || q.length < 2) { sug.classList.remove('show'); return; }
  
  const matches = Object.keys(DATA).filter(k => k.toUpperCase().includes(q)).slice(0, 6);
  if (!matches.length) { sug.classList.remove('show'); return; }
  
  sug.innerHTML = matches.map(k => {
    const name = parseName(DATA[k]);
    const st = getOverallStatus(DATA[k]);
    const stLabel = st === 'lunas' ? '✓ Lunas' : '⚡ Aktif';
    const stColor = st === 'lunas' ? 'var(--green)' : 'var(--blue)';
    return `<div class="suggestion-item" onclick="selectSuggestion('${k}')">
      <span class="s-code">${k}</span>
      <span class="s-name">${name}</span>
      <span style="margin-left:auto;font-size:11px;font-weight:700;color:${stColor}">${stLabel}</span>
    </div>`;
  }).join('');
  sug.classList.add('show');
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') cekStatus();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) document.getElementById('suggestions').classList.remove('show');
});

function selectSuggestion(code) {
  document.getElementById('searchInput').value = code;
  document.getElementById('suggestions').classList.remove('show');
  cekStatus(code);
}

// Build members grid
function buildMembersGrid() {
  const grid = document.getElementById('membersGrid');
  grid.innerHTML = Object.keys(DATA).map(k => {
    const name = parseName(DATA[k]);
    const st = getOverallStatus(DATA[k]);
    const stLabel = st === 'lunas' ? '✓ Lunas' : '⚡ Aktif';
    const stCls = st === 'lunas' ? 'status-lunas' : 'status-aktif';
    return `<div class="member-chip" onclick="selectSuggestion('${k}')">
      <div class="chip-code">${k}</div>
      <div class="chip-name">${name}</div>
      <span class="chip-status status-pill ${stCls}" style="font-size:10px;padding:2px 8px">${stLabel}</span>
    </div>`;
  }).join('');
}

buildMembersGrid();
